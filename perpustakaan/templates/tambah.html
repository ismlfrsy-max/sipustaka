{% extends 'base.html' %}

{% block title %}Kelola Buku - Tambah Buku{% endblock %}

{% block content %}
<div class="flex items-start space-x-4 mb-8">
    <a href="{% url 'dashboard' %}" class="text-slate-400 hover:text-slate-800 transition mt-1 text-lg">←</a>
    <div>
        <p class="text-xs font-medium text-slate-400">Kelola Buku</p>
        <h2 class="text-2xl font-bold text-slate-800">Tambah Buku</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-3xl">
    <form method="POST" class="space-y-5">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Judul Buku</label>
                <input type="text" name="judul" required placeholder="Masukkan judul buku" class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Pengarang</label>
                <input type="text" name="pengarang" required placeholder="Nama pengarang" class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Kategori</label>
                <select name="kategori" required class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700 cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.25rem] bg-[right_1rem_center] bg-no-repeat pr-10">
                    <option value="" disabled selected hidden>Pilih Kategori Buku</option>
                    <option value="Novel">Novel</option>
                    <option value="Self-improvement">Self-improvement</option>
                    <option value="Bisnis">Bisnis</option>
                    <option value="Fiksi">Fiksi</option>
                    <option value="Horor">Horor</option>
                    <option value="Psikologi">Psikologi</option>
                    <option value="Sains">Sains</option>
                    <option value="Sejarah">Sejarah</option>
                    <option value="Komik">Komik</option>
                    <option value="Biografi">Biografi</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Penerbit</label>
                <input type="text" name="penerbit" required placeholder="Nama penerbit" class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Tahun Terbit</label>
                <input type="number" name="tahun_terbit" required placeholder="Contoh: 2024" class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Stok</label>
                <input type="number" name="stok" required placeholder="Jumlah stok buku" class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">ISBN</label>
                <input type="text" name="isbn" placeholder="Contoh: 978-xxx-xxx" class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Rak / Lokasi</label>
                <select name="rak" required class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700 cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.25rem] bg-[right_1rem_center] bg-no-repeat pr-10">
                    <option value="" disabled selected hidden>Pilih Lokasi Rak</option>
                    <option value="Rak A-01">Rak A-01</option>
                    <option value="Rak A-02">Rak A-02</option>
                    <option value="Rak A-03">Rak A-03</option>
                    <option value="Rak B-01">Rak B-01</option>
                    <option value="Rak B-02">Rak B-02</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Deskripsi</label>
                <textarea name="deskripsi" rows="4" placeholder="Tuliskan ringkasan cerita atau deskripsi singkat buku..." class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700"></textarea>
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
            <a href="{% url 'dashboard' %}" class="bg-white hover:bg-slate-50 border border-slate-200 text-slate-600 font-semibold text-sm px-5 py-2.5 rounded-xl transition">
                Batal
            </a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-5 py-2.5 rounded-xl shadow-md shadow-blue-500/10 transition">
                Simpan Buku
            </button>
        </div>
    </form>
</div>
{% endblock %}
