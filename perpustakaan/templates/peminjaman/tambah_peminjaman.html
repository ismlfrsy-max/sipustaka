{% extends 'base.html' %}

{% block title %}Pinjam Buku - SIPUSTAKA{% endblock %}

{% block content %}
<div class="mb-8 flex items-center">
    <a href="{% url 'daftar_peminjaman' %}" class="mr-4 text-slate-400 hover:text-slate-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
    </a>
    <div>
        <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Peminjaman Buku</p>
        <h2 class="text-3xl font-bold text-slate-800">Pinjam Buku</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-4xl mx-auto">
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Peminjam</label>
                <select name="siswa_id" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50/50 text-slate-700 transition text-sm">
                    <option value="">-- Pilih Siswa --</option>
                    {% for s in siswa_list %}
                        <option value="{{ s.id }}">{{ s.nama }} - {{ s.kelas }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Pilih Buku</label>
                <select name="buku_id" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50/50 text-slate-700 transition text-sm">
                    <option value="">-- Pilih Buku --</option>
                    {% for b in buku_list %}
                        <option value="{{ b.id }}">{{ b.judul }} ({{ b.stok }} stok)</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Tanggal Pinjam</label>
                <input type="date" name="tanggal_pinjam" value="{{ hari_ini }}" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 text-slate-600 text-sm transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Tanggal Jatuh Tempo</label>
                <input type="date" name="jatuh_tempo" value="{{ jatuh_tempo }}" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 text-slate-600 text-sm transition">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Keperluan</label>
                <select name="keperluan" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50/50 text-slate-700 transition text-sm">
                    <option value="">-- Pilih Keperluan --</option>
                    <option value="Bacaan pribadi">Bacaan pribadi</option>
                    <option value="Tugas sekolah">Tugas sekolah</option>
                    <option value="Referensi ujian">Referensi ujian</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Petugas</label>
                <select name="petugas" required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 bg-slate-50/50 text-slate-700 transition text-sm">
                    <option value="">-- Pilih Petugas --</option>
                    <option value="Budi Siregar">Budi Siregar</option>
                    <option value="Ismail Hasan">Ismail Hasan</option>
                    <option value="Siti Aminah">Siti Aminah</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Catatan</label>
            <textarea name="catatan" rows="4" placeholder="Contoh: buku untuk tugas Bahasa Indonesia" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 text-slate-700 text-sm transition resize-none"></textarea>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
            <a href="{% url 'daftar_peminjaman' %}" class="px-5 py-2.5 border border-slate-200 rounded-xl font-medium text-slate-600 hover:bg-slate-50 transition text-sm">
                Batal
            </a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-medium transition shadow-lg shadow-blue-500/10 text-sm">
                Pinjam Buku
            </button>
        </div>
    </form>
</div>
{% endblock %}
