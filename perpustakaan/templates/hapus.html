{% extends 'base.html' %}

{% block title %}Kelola Buku - Hapus Buku{% endblock %}

{% block content %}
<div class="flex items-start space-x-4 mb-8">
    <a href="{% url 'dashboard' %}" class="text-slate-400 hover:text-slate-800 transition mt-1 text-lg">←</a>
    <div>
        <p class="text-xs font-medium text-slate-400">Kelola Buku</p>
        <h2 class="text-2xl font-bold text-slate-800">Hapus Buku</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-xl">
    <div class="space-y-1 mb-6">
        <p class="text-xs text-slate-400 font-medium">Anda akan menghapus:</p>
        <h3 class="text-lg font-bold text-slate-800">{{ buku.judul }}</h3>
        <p class="text-xs text-slate-400 pt-2 border-t border-slate-100">Data peminjaman yang menggunakan buku ini tidak akan otomatis dihapus.</p>
    </div>

    <form method="POST" class="flex justify-end space-x-3">
        {% csrf_token %}
        <a href="{% url 'dashboard' %}" class="bg-white hover:bg-slate-50 border border-slate-200 text-slate-600 font-semibold text-sm px-5 py-2.5 rounded-xl transition">
            Batal
        </a>
        <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white font-semibold text-sm px-5 py-2.5 rounded-xl shadow-md shadow-rose-500/10 transition">
            Hapus
        </button>
    </form>
</div>
{% endblock %}
