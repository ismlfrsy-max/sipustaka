{% extends 'base.html' %}

{% block title %}Kelola User - Edit User{% endblock %}

{% block content %}
<div class="flex items-start space-x-4 mb-8">
    <a href="{% url 'daftar_siswa' %}" class="text-slate-400 hover:text-slate-800 transition mt-1 text-lg">←</a>
    <div>
        <p class="text-xs font-medium text-slate-400">Kelola User</p>
        <h2 class="text-2xl font-bold text-slate-800">Edit User</h2>
    </div>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-2xl">
    <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Nama Lengkap</label>
                <input type="text" name="nama" value="{{ siswa.nama }}" required class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">NIS</label>
                <input type="text" name="nis" value="{{ siswa.nis }}" required class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Kelas</label>
                <select name="kelas" required class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700 cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.25rem] bg-[right_1rem_center] bg-no-repeat pr-10">
                    <option value="X IPA 1" {% if siswa.kelas == "X IPA 1" %}selected{% endif %}>X IPA 1</option>
                    <option value="X IPA 2" {% if siswa.kelas == "X IPA 2" %}selected{% endif %}>X IPA 2</option>
                    <option value="XI IPA 1" {% if siswa.kelas == "XI IPA 1" %}selected{% endif %}>XI IPA 1</option>
                    <option value="XI IPS 1" {% if siswa.kelas == "XI IPS 1" %}selected{% endif %}>XI IPS 1</option>
                    <option value="XII IPA 1" {% if siswa.kelas == "XII IPA 1" %}selected{% endif %}>XII IPA 1</option>
                    <option value="XII IPS 1" {% if siswa.kelas == "XII IPS 1" %}selected{% endif %}>XII IPS 1</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Status Akun</label>
                <select name="status" required class="w-full px-4 py-2.5 bg-slate-50/60 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition text-slate-700 cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.25rem] bg-[right_1rem_center] bg-no-repeat pr-10">
                    <option value="Aktif" {% if siswa.status == "Aktif" %}selected{% endif %}>Aktif</option>
                    <option value="Tidak Aktif" {% if siswa.status == "Tidak Aktif" %}selected{% endif %}>Tidak Aktif</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
            <a href="{% url 'daftar_siswa' %}" class="bg-white hover:bg-slate-50 border border-slate-200 text-slate-600 font-semibold text-sm px-5 py-2.5 rounded-xl transition">Batal</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-5 py-2.5 rounded-xl shadow-md shadow-blue-500/10 transition">Perbarui User</button>
        </div>
    </form>
</div>
{% endblock %}
